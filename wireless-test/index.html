<html>
<head>
    <meta charset="utf-8">
    <title>Wireless Test</title>
</head>
<body>
    <h1>Wireless Test</h1>
    <p>This is a simple wireless test page.</p>
    <button onclick="selectDevice()">Bluetooth機器を選択</button>
</body>

<script>
    let dev = null;
    let dataChara = null;
    let server = null;
    async function selectDevice() {
        navigator.bluetooth.requestDevice({
            acceptAllDevices: true
        })
        .then(device => {
            dev = device;
            server = dev.gatt.connect();
            
            console.log('Selected device:', device);
        })
        .catch(error => {
            console.error('Error selecting device:', error);
        });
    }
</script>
</html>
