<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>雀パス 制御アプリ</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<script src="script.js"></script>
<body>
    <h1 onclick="OpenDebug()">雀パス 制御アプリ</h1>
    <h2 id="msg"></h2>

    <div class="compass">
        <div class="lt-btn">

        </div>
        <div class="stats" id="st-3">
            <div class="box">
                <div class="btns">
                    <button id="ron-btn" onclick="SelectRon(2)">ロン</button>
                    <button id="tumo-btn" onclick="ConfirmTumo(2)">ツモ</button>
                </div>
                <div class="dir">
                    西
                </div>
            </div>
        </div>
        <div class="rt-btn">

        </div>
        <div class="stats" id="st-4">
            <div class="box">
                <div class="dir">
                    北
                </div>
                <div class="btns">
                    <button id="tumo-btn" onclick="ConfirmTumo(3)">ツモ</button>
                    <button id="ron-btn" onclick="SelectRon(3)">ロン</button>
                </div>
            </div>
        </div>
        <div class="mid">
            <div class="box">
                <div class="bl"></div>
                <div class="score" id="sc-3">25000</div>
                <div class="bl"></div>
                <div class="score" id="sc-4">25000</div>
                <div class="text">
                    東1局<br>0本場<br>供託 0本
                </div>
                <div class="score" id="sc-2">25000</div>
                <div class="bl"></div>
                <div class="score" id="sc-1">25000</div>
                <div class="bl"></div>
            </div>
        </div>
        <div class="stats" id="st-2">
            <div class="box">
                <div class="btns">
                    <button id="ron-btn" onclick="SelectRon(1)">ロン</button>
                    <button id="tumo-btn" onclick="ConfirmTumo(1)">ツモ</button>
                </div>
                <div class="dir">
                    南
                </div>
            </div>
        </div>
        <div class="lb-btn">
            
        </div>
        <div class="stats" id="st-1">
            <div class="box">
                <div class="dir">
                    東
                </div>
                <div class="btns">
                    <button id="tumo-btn" onclick="ConfirmTumo(0)">ツモ</button>
                    <button id="ron-btn" onclick="SelectRon(0)">ロン</button>
                </div>
            </div>
        </div>
        <div class="rb-btn">
            
        </div>
    </div>

    <div class="commands">
        <button id="reset" onclick="Show('.screen#reset')">リセット</button>
        <button id="seisan" onclick="Show('.screen#seisan')">精算</button>
    </div>
    <div class="log" id="logger" style="display: none;">
        <!-- <div class="item error">
            <div class="icon">❌</div>
            <div class="context">エラーが発生しました</div>
        </div>
        <div class="item info">
            <div class="icon">ℹ️</div>
            <div class="context">メッセージ</div>
        </div>
        <div class="item success">
            <div class="icon">✅</div>
            <div class="context">成功</div>
        </div> -->
    </div>
    <div class="debug" style="display: none;">
        <button onclick="Hide('.debug')">✕</button>
        <input type="text" class="debug-input" placeholder="送信するデータを入力">
        <button onclick="DebugSend()">送信</button>
    </div>

    <button id="cancel" style="display: none;">キャンセル</button>

    <div class="screen" id="connection">
        <h1>ジャンパスに接続されていません</h1>
        <button id="connect" onclick="Connect()">デバイスを選択</button>
    </div>

    <div class="screen" id="tumo" style="display: none;">
        <h1>ツモ</h1>
        <h2>P0</h2>
        <div class="btn-grid">
        </div>
        <select name="TumoOther" id="TumoOther">
            <option value="">上記以外の点数</option>
        </select>
        <div class="btn-row">
            <button class="confirm" onclick="PayTumo()">確定</button>
            <button class="cancel" onclick="CancelTumo()">キャンセル</button>
        </div>
    </div>

    <div class="screen" id="ron" style="display: none;">
        <h1>ロン</h1>
        <h2>誰 → 誰</h2>
        <div class="btn-grid">
            <button class="btn-score" id="score-2000" onclick="SelectScore(2000)">2000</button>
        </div>
        <select name="RonOther" id="RonOther">
            <option value="">上記以外の点数</option>
        </select>
        <div class="btn-row">
            <button class="cancel" onclick="CancelRon()">キャンセル</button>
            <button class="confirm" onclick="PayRon()">確定</button>
        </div>
    </div>

    <div class="screen" id="reset" style="display: none;">
        <h1>ゲームをリセットしますか？</h1>
        <div class="btn-row">
            <button id="yes-reset" onclick="ConfirmReset()">はい</button>
            <button id="no-reset" onclick="Hide('.screen#reset')">いいえ</button>
        </div>
    </div>
    
    <div class="screen" id="seisan" style="display: none;">
        <h1>ゲームを終了にしますか？</h1>
        <div class="btn-row">
            <button id="no-seisan" onclick="Hide('.screen#seisan')">いいえ</button>
            <button id="yes-seisan" onclick="Seisan()">はい</button>
        </div>
    </div>

</body>
</html>
